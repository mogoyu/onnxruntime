name: Build onnxruntime for ARMv7l (Cross-Compile Verified)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Cross-Compile Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config \
            ccache \
            gfortran

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-cross-numpy${{ env.NUMPY_VERSION }}-onnx${{ env.ONNXRUNTIME_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-cross-

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"
          pip install numpy==${{ env.NUMPY_VERSION }}
          cmake --version

      - name: Download ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz
          tar xzf v${{ env.ONNXRUNTIME_VERSION }}.tar.gz
          mv onnxruntime-${{ env.ONNXRUNTIME_VERSION }} onnxruntime

      - name: Create Toolchain File
        run: |
          cat <<EOF > /home/runner/toolchain-armv7.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF
          cat /home/runner/toolchain-armv7.cmake

      - name: Build ONNX Runtime (Cross-Compile)
        run: |
          cd onnxruntime
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel $(nproc) \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_USE_OPENBLAS=OFF

      - name: Check Build Output
        run: |
          ls -lh onnxruntime/build/Linux/Release/dist/*.whl
          cp onnxruntime/build/Linux/Release/dist/*.whl ./
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}-cross
          path: "*.whl"
          retention-days: 14
