name: Build onnxruntime for ARMv7l (Ultimate Fix - Clean Sources)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (Host)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare Clean Apt Sources for ARMHF
        run: |
          echo "=== Nuking existing apt sources ==="
          # 备份
          sudo cp -r /etc/apt /etc/apt.bak
          
          # 1. 添加 armhf 架构
          sudo dpkg --add-architecture armhf
          
          # 2. 彻底重写 /etc/apt/sources.list 只使用 ports.ubuntu.com
          # Ubuntu 24.04 (Noble) 的 codename 是 noble
          sudo tee /etc/apt/sources.list > /dev/null <<EOF
deb http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
deb http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
deb http://ports.ubuntu.com/ubuntu-ports noble-backports main restricted universe multiverse
deb http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
EOF
          
          # 3. 删除 /etc/apt/sources.list.d/ 下所有可能包含 security.ubuntu.com 的文件
          sudo rm -rf /etc/apt/sources.list.d/*
          
          # 4. 更新 apt
          echo "=== Updating apt with clean ports sources ==="
          sudo apt-get update
          
          # 验证：确保没有 armhf 相关的 error
          echo "=== Apt update finished ==="

      - name: Install Cross Toolchain (No Python Dev via Apt)
        run: |
          echo "=== Installing Cross Toolchain ==="
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config \
            ccache \
            gfortran \
            zlib1g-dev:armhf \
            libbz2-dev:armhf \
            liblzma-dev:armhf \
            libncursesw5-dev:armhf \
            libreadline-dev:armhf \
            libsqlite3-dev:armhf \
            libgdbm-dev:armhf \
            libdb5.3-dev:armhf \
            libmpdec-dev:armhf \
            libexpat1-dev:armhf \
            uuid-dev:armhf \
            libxcrypt-dev:armhf \
            || echo "Some optional packages skipped"

      - name: Manually Fetch ARM Python Headers
        run: |
          echo "=== Manually Fetching ARM Python Headers ==="
          mkdir -p /home/runner/arm-sysroot/usr/include
          mkdir -p /home/runner/arm-sysroot/usr/lib
          
          cd /tmp
          # 尝试下载 python3.11 相关的 armhf 包。
          # 如果 noble 仓库里没有精确的 3.11 dev 包，我们下载 python3-minimal 和 python3-lib2to3 等基础包
          # 实际上，我们需要的是 Python.h。通常在 python3.X-dev 包里。
          # 让我们先看看 apt-cache search 的结果，或者直接尝试下载最可能的包名
          
          # 尝试下载 python3.11-dev 如果存在，否则尝试 python3-dev
          # 注意：apt-get download 不会安装，只会下载到当前目录
          
          PKG_FOUND=0
          
          # 尝试具体版本
          if sudo apt-get download python3.11-dev:armhf python3.11-minimal:armhf 2>/dev/null; then
            PKG_FOUND=1
            echo "Downloaded python3.11-dev"
          else
            # 尝试通用版本
            if sudo apt-get download python3-dev:armhf python3-minimal:armhf 2>/dev/null; then
              PKG_FOUND=1
              echo "Downloaded generic python3-dev"
            fi
          fi
          
          if [ $PKG_FOUND -eq 0 ]; then
             echo "⚠️ Could not find python3-dev via apt. Trying to find .deb manually from launchpad or using fallback."
             # Fallback: 很多时候 python3.11 的头文件在 python3.11-minimal 或者 python3.11-stdlib 里也有部分，
             # 但 Python.h 肯定在 -dev 里。
             # 如果 apt 失败，我们尝试直接从 Ubuntu 包镜像下载 .deb
             # 这里假设 apt 已经配置好 ports 源，应该能下载到
             exit 1
          fi
          
          # 解压所有下载的 deb
          for deb in *.deb; do
            if [ -f "$deb" ]; then
              echo "Extracting $deb"
              dpkg -x "$deb" /home/runner/arm-sysroot
            fi
          done
          
          # 查找 Python.h 并建立标准路径
          PYTHON_H_PATH=$(find /home/runner/arm-sysroot -name "Python.h")
          if [ -z "$PYTHON_H_PATH" ]; then
            echo "❌ Python.h not found!"
            ls -R /home/runner/arm-sysroot/usr/include
            exit 1
          fi
          
          PYTHON_INC_DIR=$(dirname "$PYTHON_H_PATH")
          echo "Found Python.h in: $PYTHON_INC_DIR"
          
          # 标准化路径到 python3.11 (即使实际是 3.10 或 3.12，我们也创建软链接或重命名目录以匹配 ONNX 期望)
          # ONNX 通常通过 python-config 获取路径，但在交叉编译中我们强制指定
          TARGET_INC_DIR="/home/runner/arm-sysroot/usr/include/python3.11"
          if [ "$PYTHON_INC_DIR" != "$TARGET_INC_DIR" ]; then
            echo "Linking/Copying $PYTHON_INC_DIR to $TARGET_INC_DIR"
            mkdir -p $(dirname "$TARGET_INC_DIR")
            if [ -d "$TARGET_INC_DIR" ]; then rm -rf "$TARGET_INC_DIR"; fi
            ln -sf "$PYTHON_INC_DIR" "$TARGET_INC_DIR"
          fi
          
          echo "PYTHON_INCLUDE_DIR=$TARGET_INC_DIR" >> $GITHUB_ENV
          echo "✅ Python headers ready at $TARGET_INC_DIR"

      - name: Manually Fetch ARM NumPy Headers
        run: |
          echo "=== Fetching NumPy Headers ==="
          cd /tmp
          # 下载 numpy wheel (any platform, headers are same) 或者 arm 特定
          # 为了安全，下载源码包提取头文件，因为头文件是纯 C 且跨平台
          pip download numpy==${{ env.NUMPY_VERSION }} --no-binary=:all: -d /tmp/numpy_src
          
          # 解压 tar.gz
          cd /tmp/numpy_src
          tar xzf *.tar.gz
          cd numpy-*
          
          # 头文件位置通常在 numpy/core/include/numpy
          SRC_NUMPY_INC="./numpy/core/include/numpy"
          DEST_NUMPY_INC="/home/runner/arm-sysroot/usr/include/numpy"
          
          mkdir -p "$DEST_NUMPY_INC"
          cp -r "$SRC_NUMPY_INC"/* "$DEST_NUMPY_INC/"
          
          echo "NUMPY_INCLUDE_DIR=$DEST_NUMPY_INC" >> $GITHUB_ENV
          echo "✅ NumPy headers ready at $DEST_NUMPY_INC"

      - name: Install Host Build Tools
        run: |
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"
          # 关键：不安装 numpy 到宿主环境，防止 CMake 混淆

      - name: Download ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz -O onnxruntime-src.tar.gz
          rm -rf onnxruntime
          mkdir -p onnxruntime
          tar xzf onnxruntime-src.tar.gz -C onnxruntime --strip-components=1
          echo "✅ Source ready"

      - name: Create Toolchain File
        run: |
          cat <<EOF > /home/runner/toolchain-armv7.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          
          # 显式添加 sysroot
          list(APPEND CMAKE_FIND_ROOT_PATH /home/runner/arm-sysroot)
          
          # 警告抑制
          set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-maybe-uninitialized -fPIC")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-maybe-uninitialized -Wno-class-memaccess -fPIC")
          
          set(onnxruntime_BUILD_TESTS OFF)
          set(onnxruntime_BUILD_UNIT_TESTS OFF)
          EOF
          echo "✅ Toolchain created"

      - name: Build ONNX Runtime
        run: |
          cd onnxruntime
          rm -rf build/Linux
          
          # 导出包含路径
          export CFLAGS="-I${{ env.PYTHON_INCLUDE_DIR }} -I${{ env.NUMPY_INCLUDE_DIR }}"
          export CXXFLAGS="-I${{ env.PYTHON_INCLUDE_DIR }} -I${{ env.NUMPY_INCLUDE_DIR }}"
          
          echo "Using Python Include: ${{ env.PYTHON_INCLUDE_DIR }}"
          echo "Using NumPy Include: ${{ env.NUMPY_INCLUDE_DIR }}"
          echo "CFLAGS: $CFLAGS"
          
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 2 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_USE_OPENBLAS=OFF \
              onnxruntime_DISABLE_RTTI=ON \
              onnxruntime_BUILD_TESTS=OFF \
              "CMAKE_CXX_FLAGS=-Wno-error -Wno-all -Wno-extra" \
              "CMAKE_C_FLAGS=-Wno-error -Wno-all -Wno-extra"

      - name: Check and Upload
        run: |
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "✅ BUILD SUCCESSFUL!"
            ls -lh *.whl
          else
            echo "❌ Build failed."
            find . -name "*.whl"
            echo "=== Last 50 lines of CMakeOutput ==="
            tail -n 50 build/Linux/Release/CMakeFiles/CMakeOutput.log 2>/dev/null || true
            echo "=== Last 50 lines of Build Log ==="
            # 尝试找具体的错误日志
            find build -name "*.log" -exec tail -n 20 {} \; 2>/dev/null | tail -n 50
            exit 1
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-ultimate
          path: "*.whl"
          retention-days: 14
