name: Build onnxruntime for ARMv7l (Simplified & Verified)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Add ARMHF Architecture
        run: |
          sudo dpkg --add-architecture armhf
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main" | sudo tee /etc/apt/sources.list.d/armhf.list
          sudo apt-get update

      - name: Install Cross Toolchain
        run: |
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            linux-libc-dev-armhf-cross \
            cmake git wget pkg-config

      - name: Fetch ARM Python Headers
        run: |
          SYSROOT="${{ github.workspace }}/arm-sysroot"
          mkdir -p "$SYSROOT"
          cd /tmp
          # 下载 armhf python3-dev
          wget -q http://ports.ubuntu.com/pool/main/p/python3.11/libpython3.11-dev_3.11.2-3+deb12u1_armhf.deb || \
          wget -q http://archive.ubuntu.com/ubuntu/pool/main/p/python3.11/libpython3.11-dev_3.11.2-3_armhf.deb || true
          for deb in *.deb; do [ -f "$deb" ] && dpkg -x "$deb" "$SYSROOT"; done
          PYTHON_H=$(find "$SYSROOT" -name "Python.h" | head -1)
          echo "PYTHON_INCLUDE_DIR=$(dirname "$PYTHON_H")" >> "$GITHUB_ENV"
          echo "SYSROOT_DIR=$SYSROOT" >> "$GITHUB_ENV"
          echo "PYTHON_INCLUDE_DIR=$(dirname "$PYTHON_H")"

      - name: Fetch NumPy Headers
        run: |
          pip install "numpy==${{ env.NUMPY_VERSION }}"
          NUMPY_INC=$(python3 -c "import numpy; print(numpy.get_include())")
          DEST="${{ github.workspace }}/arm-sysroot/usr/include/numpy"
          mkdir -p "$DEST" && cp -r "$NUMPY_INC"/* "$DEST/"
          echo "NUMPY_INCLUDE_DIR=$DEST" >> "$GITHUB_ENV"

      - name: Install Build Tools
        run: pip install cython packaging sympy flatbuffers

      - name: Download ONNX Runtime
        run: |
          wget -q "https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz"
          mkdir -p onnxruntime && tar xzf v${{ env.ONNXRUNTIME_VERSION }}.tar.gz -C onnxruntime --strip-components=1

      - name: Patch cpuid_info.cc
        run: |
          FILE="onnxruntime/onnxruntime/core/common/cpuid_info.cc"
          # 用 sed 替换整个 ArmLinuxInit 函数
          sed -i '/void CPUIDInfo::ArmLinuxInit()/,/^}/c\
          void CPUIDInfo::ArmLinuxInit() { is_hybrid_ = false; has_arm_neon_dot_ = false; has_fp16_ = false; }' "$FILE"
          grep -q "cpuinfo_get" "$FILE" && echo "Patch failed!" && exit 1
          echo "cpuid_info.cc patched OK"

      - name: Create Toolchain File
        run: |
          cat > "${{ github.workspace }}/toolchain-armv7.cmake" << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_C_FLAGS "-march=armv7-a -mfpu=neon -mfloat-abi=hard")
          set(CMAKE_CXX_FLAGS "-march=armv7-a -mfpu=neon -mfloat-abi=hard")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

      - name: Build ONNX Runtime
        id: build_step
        continue-on-error: true
        run: |
          cd onnxruntime
          
          # 使用 build.sh，但添加关键参数
          ./build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 1 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_generator "Unix Makefiles" \
            --cmake_extra_defines \
              "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/toolchain-armv7.cmake" \
              "CMAKE_SYSTEM_PROCESSOR=armv7l" \
              "onnxruntime_BUILD_SHARED_LIB=OFF" \
              "onnxruntime_DISABLE_CONTRIB_OPS=ON" \
              "onnxruntime_ENABLE_CPUINFO=OFF" \
              "onnxruntime_BUILD_TESTS=OFF" \
              "onnxruntime_USE_CUDA=OFF" \
              "onnxruntime_USE_TENSORRT=OFF" \
              "onnxruntime_USE_DNNL=OFF" \
              "onnxruntime_USE_XNNPACK=OFF" \
              "Python3_INCLUDE_DIR=${PYTHON_INCLUDE_DIR}" \
              "NUMPY_INCLUDE_DIR=${NUMPY_INCLUDE_DIR}" \
            2>&1 | tee ../build.log
          
          echo "build_exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Show Errors (If Failed)
        if: steps.build_step.outcome == 'failure'
        run: |
          echo "=== LAST 200 LINES ==="
          tail -200 build.log
          echo ""
          echo "=== ALL ERRORS ==="
          grep -in "error:" build.log | head -30 || echo "No errors found"

      - name: Upload Wheel (If Success)
        if: steps.build_step.outcome == 'success'
        run: |
          find onnxruntime/build -name "*.whl" -exec cp {} ./ \;
          ls -lh *.whl 2>/dev/null || echo "No wheel found"

      - name: Upload Artifact
        if: steps.build_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: "onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l"
          path: "*.whl"
          retention-days: 14
