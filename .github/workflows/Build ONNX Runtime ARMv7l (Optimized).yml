name: Build onnxruntime for ARMv7l (Cached Numpy & Fixed URL)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7.yml'

env:
  ONNXRUNTIME_VERSION: "1.19.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 缓存 Pip (包含编译好的 numpy wheel)
      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-numpy${{ env.NUMPY_VERSION }}-${{ hashFiles('Dockerfile.build') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-

      # 🔥 缓存 C++ 编译对象 (ccache)
      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-

      - name: Build Wheel
        run: |
          # 🔥 关键技巧：定义 Shell 变量，利用 GitHub Actions 注入具体值
          # 这样在下面的 cat 中，${ONNX_VER} 会被替换为 "1.19.0"
          ONNX_VER="${{ env.ONNXRUNTIME_VERSION }}"
          NUMPY_VER="${{ env.NUMPY_VERSION }}"
          PY_VER="${{ env.PYTHON_VERSION }}"

          echo "Building ONNX Runtime ${ONNX_VER} with Numpy ${NUMPY_VER} for Python ${PY_VER}"

          cat <<EOF > Dockerfile.build
          FROM python:${PY_VER}-bullseye AS builder

          ENV DEBIAN_FRONTEND=noninteractive

          # 1. 安装系统依赖
          RUN apt-get update && apt-get install -y \
              build-essential \
              cmake \
              git \
              wget \
              libssl-dev \
              libffi-dev \
              libopenblas-dev \
              libeigen3-dev \
              pkg-config \
              ccache \
              gfortran \
              && rm -rf /var/lib/apt/lists/*

          # 2. 配置 Ccache
          ENV CCACHE_DIR=/tmp/ccache
          RUN mkdir -p \$CCACHE_DIR && ln -s /usr/bin/ccache /usr/local/bin/gcc && ln -s /usr/bin/ccache /usr/local/bin/g++

          # 3. 升级 pip 并安装轻量依赖
          RUN pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers

          # 4. 🔥 编译/安装 Numpy
          # ✅ 修改点：去掉了 --no-cache-dir，允许 pip 读写缓存
          # 第一次会慢（编译），之后会从 ~/.cache/pip 读取编译好的 wheel
          ENV NPY_BLAS_LIBS="-lopenblas"
          ENV NPY_LAPACK_LIBS="-lopenblas"
          RUN pip install numpy==${NUMPY_VER}

          # 5. 🔥 下载 OnnxRuntime (版本号已硬编码，不再是变量)
          WORKDIR /source
          # 这里的 ${ONNX_VER} 在 cat 执行前已经被 Shell 替换成了具体数字 (如 1.19.0)
          RUN wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${ONNX_VER}.tar.gz && \
              tar xzf v${ONNX_VER}.tar.gz && \
              mv onnxruntime-${ONNX_VER} onnxruntime

          WORKDIR /source/onnxruntime

          # 6. 执行编译
          RUN python build.sh \
              --config Release \
              --update \
              --build \
              --build_wheel \
              --use_openblas \
              --arm_version 7 \
              --skip_tests \
              --enable_pybind \
              --use_ccache \
              --parallel 2

          # 7. 输出
          WORKDIR /source/onnxruntime/build/Linux/Release/dist
          RUN ls -lh *.whl
          RUN mkdir -p /output && cp *.whl /output/
          EOF

          # 打印生成的 Dockerfile 以便调试 (确认版本号是否正确)
          echo "--- Generated Dockerfile ---"
          cat Dockerfile.build
          echo "--------------------------"

          mkdir -p output

          # 构建
          docker buildx build \
            --platform linux/arm/v7 \
            --load \
            --progress=plain \
            --target builder \
            -t onnxruntime-armv7-builder \
            -f Dockerfile.build .

          # 提取
          CONTAINER_ID=$(docker create onnxruntime-armv7-builder)
          docker cp $CONTAINER_ID:/output/. ./output/
          docker rm $CONTAINER_ID

          echo "✅ Build Finished!"
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}
          path: output/*.whl
          retention-days: 14
