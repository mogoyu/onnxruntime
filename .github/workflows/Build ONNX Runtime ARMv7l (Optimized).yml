name: Build onnxruntime for ARMv7l (Py3.11 Optimized)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7.yml'

env:
  ONNXRUNTIME_VERSION: "1.19.0"
  PYTHON_VERSION: "3.11"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-${{ hashFiles('Dockerfile.build') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-

      - name: Build Wheel
        run: |
          cat <<EOF > Dockerfile.build
          # ✅ 修复：添加 AS builder 标签，并移除硬编码的 platform (由 buildx 控制)
          FROM python:${{ env.PYTHON_VERSION }}-bullseye AS builder

          ARG ONNX_VERSION=${{ env.ONNXRUNTIME_VERSION }}
          ENV DEBIAN_FRONTEND=noninteractive

          # 1. 安装系统依赖
          RUN apt-get update && apt-get install -y \
              build-essential \
              cmake \
              git \
              wget \
              libssl-dev \
              libffi-dev \
              libopenblas-dev \
              libeigen3-dev \
              pkg-config \
              ccache \
              && rm -rf /var/lib/apt/lists/*

          # 2. 配置 Ccache
          ENV CCACHE_DIR=/tmp/ccache
          RUN mkdir -p \$CCACHE_DIR && ln -s /usr/bin/ccache /usr/local/bin/gcc && ln -s /usr/bin/ccache /usr/local/bin/g++

          # 3. 安装预编译的 numpy (避免源码编译耗时)
          RUN pip install --only-binary=:all: numpy==1.26.4 setuptools wheel cython packaging sympy flatbuffers

          # 4. 下载 onnxruntime 源码
          WORKDIR /source
          RUN wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${ONNX_VERSION}.tar.gz && \
              tar xzf v${ONNX_VERSION}.tar.gz && \
              mv onnxruntime-${ONNX_VERSION} onnxruntime

          WORKDIR /source/onnxruntime

          # 5. 执行编译
          # --parallel 2 : 防止 OOM
          # --use_ccache : 启用缓存加速
          RUN python build.sh \
              --config Release \
              --update \
              --build \
              --build_wheel \
              --use_openblas \
              --arm_version 7 \
              --skip_tests \
              --enable_pybind \
              --use_ccache \
              --parallel 2

          # 6. 准备输出
          WORKDIR /source/onnxruntime/build/Linux/Release/dist
          RUN ls -lh *.whl
          RUN mkdir -p /output && cp *.whl /output/
          EOF

          mkdir -p output

          # ✅ 修复：移除 --target builder (因为只有一个阶段，默认就是它)，或者保留但确保 Dockerfile 里有 AS builder
          # 这里我们显式指定 --target builder 以匹配 Dockerfile 中的 AS builder
          docker buildx build \
            --platform linux/arm/v7 \
            --load \
            --progress=plain \
            --target builder \
            -t onnxruntime-armv7-builder \
            -f Dockerfile.build .

          # 提取文件
          CONTAINER_ID=$(docker create onnxruntime-armv7-builder)
          docker cp $CONTAINER_ID:/output/. ./output/
          docker rm $CONTAINER_ID

          echo "✅ Build Finished!"
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}
          path: output/*.whl
          retention-days: 14
