name: Build onnxruntime for ARMv7l (DEB822 Format Fix)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Add ARMHF Architecture and DEB822 Source
        run: |
          sudo dpkg --add-architecture armhf
          sudo tee /etc/apt/sources.list.d/armhf-ports.sources > /dev/null << 'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security noble-backports
          Components: main restricted universe multiverse
          Architectures: armhf
          EOF
          sudo apt-get update || echo "Warning: Some apt sources failed, continuing..."

      - name: Install Cross Toolchain
        run: |
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf build-essential cmake git wget libssl-dev libffi-dev libeigen3-dev pkg-config ccache gfortran zlib1g-dev:armhf libbz2-dev:armhf liblzma-dev:armhf libncursesw5-dev:armhf libreadline-dev:armhf libsqlite3-dev:armhf libgdbm-dev:armhf libdb5.3-dev:armhf libmpdec-dev:armhf libexpat1-dev:armhf uuid-dev:armhf libxcrypt-dev:armhf

      - name: Fetch ARM Python Headers
        run: |
          mkdir -p /home/runner/arm-sysroot/usr/include
          cd /tmp
          sudo apt-get download python3.11-dev:armhf python3.11-minimal:armhf || sudo apt-get download python3-dev:armhf python3-minimal:armhf
          for deb in *.deb; do dpkg -x "$deb" /home/runner/arm-sysroot; done
          PYTHON_H_PATH=$(find /home/runner/arm-sysroot -name "Python.h" | head -n 1)
          PYTHON_INC_DIR=$(dirname "$PYTHON_H_PATH")
          TARGET_INC_DIR="/home/runner/arm-sysroot/usr/include/python3.11"
          mkdir -p "$(dirname "$TARGET_INC_DIR")"
          ln -sf "$PYTHON_INC_DIR" "$TARGET_INC_DIR"
          echo "PYTHON_INCLUDE_DIR=$TARGET_INC_DIR" >> "$GITHUB_ENV"

      - name: Fetch ARM NumPy Headers
        run: |
          cd /tmp
          pip download "numpy==${{ env.NUMPY_VERSION }}" --no-binary=:all: -d /tmp/numpy_src
          cd /tmp/numpy_src
          tar xzf "$(ls *.tar.gz | head -n 1)"
          cd numpy-*
          DEST_DIR="/home/runner/arm-sysroot/usr/include/numpy"
          mkdir -p "$DEST_DIR"
          cp -r ./numpy/core/include/numpy/* "$DEST_DIR/"
          echo "NUMPY_INCLUDE_DIR=$DEST_DIR" >> "$GITHUB_ENV"

      - name: Install Host Build Tools
        run: |
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"

      - name: Download ONNX Runtime
        run: |
          wget -q "https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz" -O onnxruntime-src.tar.gz
          rm -rf onnxruntime
          mkdir -p onnxruntime
          tar xzf onnxruntime-src.tar.gz -C onnxruntime --strip-components=1

      - name: Create Toolchain File
        run: |
          echo "set(CMAKE_SYSTEM_NAME Linux)" > /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_SYSTEM_PROCESSOR armv7l)" >> /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)" >> /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)" >> /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)" >> /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)" >> /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)" >> /home/runner/toolchain-armv7.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)" >> /home/runner/toolchain-armv7.cmake
          echo "list(APPEND CMAKE_FIND_ROOT_PATH /home/runner/arm-sysroot)" >> /home/runner/toolchain-armv7.cmake
          echo "set(onnxruntime_BUILD_TESTS OFF)" >> /home/runner/toolchain-armv7.cmake

      - name: Build ONNX Runtime
        run: |
          cd onnxruntime
          rm -rf build/Linux
          echo "PYTHON_INCLUDE_DIR=$PYTHON_INCLUDE_DIR"
          echo "NUMPY_INCLUDE_DIR=$NUMPY_INCLUDE_DIR"
          bash build.sh --config Release --update --build --build_wheel --skip_tests --enable_pybind --parallel 2 --allow_running_as_root --skip_submodule_sync --cmake_extra_defines CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake CMAKE_POLICY_VERSION_MINIMUM=3.5 CMAKE_SYSTEM_PROCESSOR=armv7l onnxruntime_USE_FULL_PROTOBUF=OFF onnxruntime_BUILD_SHARED_LIB=OFF onnxruntime_DISABLE_RTTI=ON onnxruntime_BUILD_TESTS=OFF

      - name: Check and Upload
        run: |
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "BUILD SUCCESSFUL!"
            ls -lh *.whl
          else
            echo "Build failed."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-deb822"
          path: "*.whl"
          retention-days: 14
