name: Build onnxruntime for ARMv7l (Py3.11 Final Fix)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7.yml'

env:
  ONNXRUNTIME_VERSION: "1.19.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-numpy${{ env.NUMPY_VERSION }}-${{ hashFiles('Dockerfile.build') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-

      - name: Build Wheel
        run: |
          # 🔥 关键修复：直接使用 GitHub Actions 变量替换 Dockerfile 内容
          # 这样 Dockerfile 里就是具体的版本号，不再依赖运行时环境变量
          cat <<EOF > Dockerfile.build
          FROM python:${{ env.PYTHON_VERSION }}-bullseye AS builder

          # 硬编码版本号，避免 Docker 构建时变量丢失
          ARG ONNX_VERSION=${{ env.ONNXRUNTIME_VERSION }}
          ENV DEBIAN_FRONTEND=noninteractive

          # 1. 安装系统依赖
          RUN apt-get update && apt-get install -y \
              build-essential \
              cmake \
              git \
              wget \
              libssl-dev \
              libffi-dev \
              libopenblas-dev \
              libeigen3-dev \
              pkg-config \
              ccache \
              gfortran \
              && rm -rf /var/lib/apt/lists/*

          # 2. 配置 Ccache
          ENV CCACHE_DIR=/tmp/ccache
          RUN mkdir -p \$CCACHE_DIR && ln -s /usr/bin/ccache /usr/local/bin/gcc && ln -s /usr/bin/ccache /usr/local/bin/g++

          # 3. 升级 pip 并安装其他轻量依赖
          RUN pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers

          # 4. 编译安装 numpy (指定兼容版本)
          ENV NPY_BLAS_LIBS="-lopenblas"
          ENV NPY_LAPACK_LIBS="-lopenblas"
          RUN pip install --no-cache-dir numpy==${{ env.NUMPY_VERSION }}

          # 5. 下载 onnxruntime 源码
          # 此时 ONNX_VERSION 已经是具体值 (如 1.19.0)，或者我们在 wget 中直接使用硬编码值更稳妥
          WORKDIR /source
          RUN wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${ONNX_VERSION}.tar.gz && \
              tar xzf v${ONNX_VERSION}.tar.gz && \
              mv onnxruntime-\${ONNX_VERSION} onnxruntime

          WORKDIR /source/onnxruntime

          # 6. 执行编译
          RUN python build.sh \
              --config Release \
              --update \
              --build \
              --build_wheel \
              --use_openblas \
              --arm_version 7 \
              --skip_tests \
              --enable_pybind \
              --use_ccache \
              --parallel 2

          # 7. 准备输出
          WORKDIR /source/onnxruntime/build/Linux/Release/dist
          RUN ls -lh *.whl
          RUN mkdir -p /output && cp *.whl /output/
          EOF

          mkdir -p output

          # 构建
          docker buildx build \
            --platform linux/arm/v7 \
            --load \
            --progress=plain \
            --target builder \
            -t onnxruntime-armv7-builder \
            -f Dockerfile.build .

          # 提取
          CONTAINER_ID=$(docker create onnxruntime-armv7-builder)
          docker cp $CONTAINER_ID:/output/. ./output/
          docker rm $CONTAINER_ID

          echo "✅ Build Finished!"
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}
          path: output/*.whl
          retention-days: 14
