name: Build onnxruntime for ARMv7l (Final Fixed)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Upgrade pip and setuptools
        run: |
          pip install --upgrade pip setuptools wheel

      - name: Add ARMHF Architecture
        run: |
          sudo dpkg --add-architecture armhf || true
          sudo tee /etc/apt/sources.list.d/armhf-ports.list > /dev/null << 'EOF'
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          EOF
          sudo apt-get update || true

      - name: Install Cross Toolchain
        run: |
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-dev-armhf-cross \
            linux-libc-dev-armhf-cross \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config

      - name: Fetch ARM Python Headers
        run: |
          SYSROOT_DIR="${{ github.workspace }}/arm-sysroot"
          mkdir -p "$SYSROOT_DIR/usr/include"
          cd /tmp
          sudo apt-get download python3-dev:armhf 2>/dev/null || true
          for deb in python3*.deb; do
            [ -f "$deb" ] && dpkg -x "$deb" "$SYSROOT_DIR" 2>/dev/null || true
          done
          PYTHON_H_PATH=$(find "$SYSROOT_DIR" -name "Python.h" 2>/dev/null | head -n 1)
          if [ -n "$PYTHON_H_PATH" ]; then
            PYTHON_INC_DIR=$(dirname "$PYTHON_H_PATH")
            TARGET_INC_DIR="$SYSROOT_DIR/usr/include/python3"
            mkdir -p "$(dirname "$TARGET_INC_DIR")"
            ln -sf "$PYTHON_INC_DIR" "$TARGET_INC_DIR"
            echo "PYTHON_INCLUDE_DIR=$TARGET_INC_DIR" >> "$GITHUB_ENV"
          else
            echo "PYTHON_INCLUDE_DIR=$SYSROOT_DIR/usr/include/python3" >> "$GITHUB_ENV"
          fi
          echo "SYSROOT_DIR=$SYSROOT_DIR" >> "$GITHUB_ENV"

      - name: Fetch NumPy Headers
        run: |
          pip install "numpy==${{ env.NUMPY_VERSION }}"
          NUMPY_INC=$(python3 -c "import numpy; print(numpy.get_include())")
          DEST_DIR="${{ github.workspace }}/arm-sysroot/usr/include/numpy"
          mkdir -p "$DEST_DIR"
          cp -r "$NUMPY_INC"/* "$DEST_DIR/" 2>/dev/null || true
          echo "NUMPY_INCLUDE_DIR=$DEST_DIR" >> "$GITHUB_ENV"

      - name: Install Host Build Tools
        run: |
          pip install cython packaging sympy flatbuffers "cmake>=3.26"

      - name: Download ONNX Runtime
        run: |
          wget -q "https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz" -O onnxruntime-src.tar.gz
          rm -rf onnxruntime
          mkdir -p onnxruntime
          tar xzf onnxruntime-src.tar.gz -C onnxruntime --strip-components=1

      - name: Patch cpuid_info.cc (Fix cpuinfo cross-compile issue)
        run: |
          CPUID_FILE="onnxruntime/onnxruntime/core/common/cpuid_info.cc"
          
          # 备份原文件
          cp "$CPUID_FILE" "$CPUID_FILE.bak"
          
          # 替换 ArmLinuxInit 函数为空实现
          cat > /tmp/cpuid_patch.py << 'PYEOF'
          import re
          
          with open("onnxruntime/onnxruntime/core/common/cpuid_info.cc", "r") as f:
              content = f.read()
          
          # 找到 ArmLinuxInit 函数并替换为空实现
          pattern = r'(void CPUIDInfo::ArmLinuxInit\(\)[^{]*\{)[^}]*\}'
          replacement = '''void CPUIDInfo::ArmLinuxInit() {
              // Cross-compile: skip cpuinfo detection
              is_hybrid_ = false;
              has_arm_neon_dot_ = false;
              has_fp16_ = false;
          }'''
          
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          
          with open("onnxruntime/onnxruntime/core/common/cpuid_info.cc", "w") as f:
              f.write(content)
          
          print("Patched cpuid_info.cc successfully")
          PYEOF
          
          python3 /tmp/cpuid_patch.py

      - name: Create Toolchain File
        run: |
          cat > "${{ github.workspace }}/toolchain-armv7.cmake" << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_C_FLAGS "-march=armv7-a -mfpu=neon -mfloat-abi=hard")
          set(CMAKE_CXX_FLAGS "-march=armv7-a -mfpu=neon -mfloat-abi=hard")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          list(APPEND CMAKE_FIND_ROOT_PATH /usr/arm-linux-gnueabihf)
          set(onnxruntime_BUILD_TESTS OFF)
          set(onnxruntime_BUILD_UNIT_TESTS OFF)
          EOF

      - name: Find Python Library
        run: |
          echo "Python version: $(python3 --version)"
          PYTHON_LIB_DIR=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          PYTHON_LIB_FILE=$(find "$PYTHON_LIB_DIR" -name "libpython3.11*" 2>/dev/null | head -n 1)
          [ -z "$PYTHON_LIB_FILE" ] && PYTHON_LIB_FILE=$(find /opt/hostedtoolcache/Python/3.11* -name "libpython3.11*" 2>/dev/null | head -n 1)
          [ -z "$PYTHON_LIB_FILE" ] && PYTHON_LIB_FILE=$(find /opt/hostedtoolcache/Python/3.11* -name "libpython3*.a" 2>/dev/null | head -n 1)
          echo "PYTHON_LIBRARY=$PYTHON_LIB_FILE" >> "$GITHUB_ENV"
          echo "Using Python library: $PYTHON_LIB_FILE"

      - name: Build ONNX Runtime
        run: |
          cd onnxruntime
          rm -rf build/Linux
          
          echo "=== Build Configuration ==="
          env | grep -E "PYTHON|NUMPY|SYSROOT" || true
          echo "==========================="
          
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 2 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_DISABLE_RTTI=ON \
              onnxruntime_BUILD_TESTS=OFF \
              onnxruntime_BUILD_UNIT_TESTS=OFF \
              onnxruntime_ENABLE_CPUINFO=OFF \
              onnxruntime_BUILD_CONTRIB_OPS=OFF \
              onnxruntime_USE_NNAPI=OFF \
              onnxruntime_USE_CUDA=OFF \
              onnxruntime_USE_TENSORRT=OFF \
              onnxruntime_USE_OPENVINO=OFF \
              onnxruntime_USE_DNNL=OFF \
              onnxruntime_USE_ACL=OFF \
              onnxruntime_USE_ARMNN=OFF \
              onnxruntime_USE_XNNPACK=OFF \
              onnxruntime_ENABLE_LTO=OFF \
              onnxruntime_BUILD_WEBASSEMBLY=OFF \
              Python3_EXECUTABLE=$(which python3) \
              Python3_INCLUDE_DIR=${PYTHON_INCLUDE_DIR} \
              Python3_LIBRARY=${PYTHON_LIBRARY} \
            2>&1 | tee ../build_full.log || BUILD_FAILED=1
          
          if [ "$BUILD_FAILED" = "1" ]; then
            echo "=== BUILD FAILED ==="
            tail -300 ../build_full.log
            grep -in "error:" ../build_full.log | tail -30 || true
            exit 1
          fi

      - name: Check and Upload
        run: |
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "BUILD SUCCESSFUL!"
            ls -lh *.whl
          else
            echo "No wheel found."
            find onnxruntime/build -name "*.whl" 2>/dev/null || true
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l"
          path: "*.whl"
          retention-days: 14
