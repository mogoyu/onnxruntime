name: Build ONNX Runtime for ARMv7 (Cross-Compile)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

jobs:
  build-armv7:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        # 可以选择不同的构建类型
        build_type: [Release]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # ONNX Runtime 依赖很多子模块，必须递归克隆
        fetch-depth: 0

    - name: Install Cross-Compilation Toolchain (ARMv7)
      run: |
        sudo apt-get update
        # 安装 ARMv7 (armhf) 交叉编译器
        sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

    - name: Setup Python (Optional, for build scripts)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configure CMake (Cross-Compile)
      run: |
        # 创建构建目录
        mkdir -p build_armv7
        cd build_armv7

        # 定义工具链文件内容 (也可以单独建文件，这里为了简便直接在命令行指定)
        # 注意：ONNX Runtime 有自带的 cmake/tools 工具链，但手动指定 CC/CXX 更直接
        
        # 核心修复：添加 -Wno-array-bounds 到 CXXFLAGS 以规避 GCC 13 误报
        export CXXFLAGS="-Wno-array-bounds -O3"
        export CFLAGS="-Wno-array-bounds -O3"

        cmake .. \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=armv7l \
          -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
          -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
          -DCMAKE_C_FLAGS="$CFLAGS" \
          -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -Donnxruntime_BUILD_UNIT_TESTS=OFF \
          -Donnxruntime_BUILD_SHARED_LIB=ON \
          -Donnxruntime_ENABLE_CPUINFO=OFF \
          -Donnxruntime_USE_FULL_PROTOBUF=OFF \
          -Dprotobuf_BUILD_TESTS=OFF \
          -Donnxruntime_DISABLE_RTTI=OFF \
          -DOnnxruntime_MINIMAL_BUILD=OFF \
          -Donnxruntime_USE_NNAPI=OFF \
          -Donnxruntime_USE_CUDA=OFF \
          -Donnxruntime_USE_TENSORRT=OFF \
          -Donnxruntime_USE_OPENMP=ON \
          -Donnxruntime_USE_XNNPACK=ON \
          -DCMAKE_INSTALL_PREFIX=./install

    - name: Build ONNX Runtime
      run: |
        cd build_armv7
        # 使用多线程编译加速
        cmake --build . --config ${{ matrix.build_type }} -- -j$(nproc)

    - name: Install (Copy to output dir)
      run: |
        cd build_armv7
        cmake --install .

    - name: Verify Binary Architecture
      run: |
        echo "Checking binary architecture..."
        # 检查生成的 .so 文件是否为 ARM
        file build_armv7/install/lib/libonnxruntime.so*
        # 如果 file 命令显示 "ARM, EABI5" 或类似字样，则成功
        if file build_armv7/install/lib/libonnxruntime.so* | grep -q "ARM"; then
          echo "Success: Binary is compiled for ARM."
        else
          echo "Error: Binary might not be ARM."
          exit 1
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: onnxruntime-armv7-${{ matrix.build_type }}
        path: |
          build_armv7/install/lib/*.so*
          build_armv7/install/include/**/*.h
        retention-days: 5
