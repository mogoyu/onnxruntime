name: Build onnxruntime for ARMv7l (Fix Array Bounds)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Cross-Compile Toolchain (GCC 13 with fixes)
        run: |
          sudo apt-get update
          # 安装必要的交叉编译工具
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config \
            ccache \
            gfortran

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"
          pip install numpy==${{ env.NUMPY_VERSION }}

      - name: Download and Extract ONNX Runtime
        run: |
          echo "=== Downloading ONNX Runtime v${{ env.ONNXRUNTIME_VERSION }} ==="
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz -O onnxruntime-src.tar.gz
          
          rm -rf onnxruntime onnxruntime-src onnxruntime/build
          mkdir -p onnxruntime-src
          tar xzf onnxruntime-src.tar.gz -C onnxruntime-src --strip-components=1
          
          if [ ! -f "onnxruntime-src/build.sh" ]; then
            echo "❌ build.sh not found!"
            exit 1
          fi
          
          mv onnxruntime-src onnxruntime
          echo "✅ Source ready"

      - name: Create Toolchain File (Strict Warning Suppression)
        run: |
          cat <<EOF > /home/runner/toolchain-armv7.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          
          # ✅ 关键修复：显式禁用 array-bounds 和其他严格检查
          # GCC 13 对 vector::back() 的空检查过于敏感，即使逻辑上非空
          set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -fPIC")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -fPIC")
          EOF
          echo "✅ Toolchain file created with specific warning suppressions"

      - name: Build ONNX Runtime (Cross-Compile)
        run: |
          cd onnxruntime
          echo "=== Starting Build with relaxed bounds checking ==="
          
          # 确保构建目录是全新的
          rm -rf build/Linux
          
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 2 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_USE_OPENBLAS=OFF \
              onnxruntime_DISABLE_RTTI=ON \
              "CMAKE_CXX_FLAGS=-Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-unused-variable -Wno-sign-compare" \
              "CMAKE_C_FLAGS=-Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-unused-variable"

      - name: Check Build Output
        run: |
          echo "=== Checking Build Output ==="
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "✅ Build Successful!"
            ls -lh *.whl
          else
            echo "❌ Build failed or no wheel found."
            find . -name "*.whl"
            echo "=== Last 50 lines of build log ==="
            # 尝试查找具体的错误日志
            find . -name "*.log" -o -name "CMakeOutput.log" | head -5 | xargs -I {} tail -n 50 {}
            exit 1
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}-bounds-fix
          path: "*.whl"
          retention-days: 14
