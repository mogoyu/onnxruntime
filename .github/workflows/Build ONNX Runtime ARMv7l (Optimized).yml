name: Build onnxruntime for ARMv7l (Stable v1.15.0)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7.yml'

env:
  # 🔥 降级到 1.15.0，这是社区验证过对 ARMv7 支持最好的版本之一
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-numpy${{ env.NUMPY_VERSION }}-onnx${{ env.ONNXRUNTIME_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-armv7-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-armv7-${{ env.ONNXRUNTIME_VERSION }}-

      - name: Build Wheel
        run: |
          ONNX_VER="${{ env.ONNXRUNTIME_VERSION }}"
          NUMPY_VER="${{ env.NUMPY_VERSION }}"
          PY_VER="${{ env.PYTHON_VERSION }}"

          echo "Building ONNX Runtime ${ONNX_VER} (ARMv7 Stable) with Numpy ${NUMPY_VER}"

          cat <<EOF > Dockerfile.build
          FROM python:${PY_VER}-bullseye AS builder

          ENV DEBIAN_FRONTEND=noninteractive

          # 1. 安装系统依赖
          # 注意：armv7 需要 gcc/g++ 多架构支持，但 bullseye 默认通常够用
          RUN apt-get update && apt-get install -y \
              build-essential \
              cmake \
              git \
              wget \
              libssl-dev \
              libffi-dev \
              libopenblas-dev \
              libeigen3-dev \
              pkg-config \
              ccache \
              gfortran \
              && rm -rf /var/lib/apt/lists/*

          # 2. 配置 Ccache (通过环境变量生效，无需 build.sh 参数)
          ENV CCACHE_DIR=/tmp/ccache
          ENV CCACHE_MAXSIZE=1G
          RUN mkdir -p \$CCACHE_DIR && ln -s /usr/bin/ccache /usr/local/bin/gcc && ln -s /usr/bin/ccache /usr/local/bin/g++

          # 3. 升级 pip 并安装轻量依赖
          RUN pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers

          # 4. 编译/安装 Numpy (利用缓存)
          ENV NPY_BLAS_LIBS="-lopenblas"
          ENV NPY_LAPACK_LIBS="-lopenblas"
          RUN pip install numpy==${NUMPY_VER}

          # 5. 下载 OnnxRuntime (指定稳定版本)
          WORKDIR /source
          RUN wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${ONNX_VER}.tar.gz && \
              tar xzf v${ONNX_VER}.tar.gz && \
              mv onnxruntime-${ONNX_VER} onnxruntime

          WORKDIR /source/onnxruntime

          # 6. 🔥 执行编译 (适配 1.15.0 参数)
          # 变更说明：
          # 1. 移除了 --arm_version (1.14 在 armv7 上通常自动识别，或通过 CMake 定义)
          # 2. 移除了 --use_openblas (改用 --cmake_extra_defines 指定 BLAS)
          # 3. 移除了 --use_ccache (CMake 会自动检测 ccache，如果 gcc 链接了它)
          # 4. 添加 --cmake_extra_defines 来强制指定 ARMv7 架构和 OpenBLAS
          
          RUN bash build.sh \
              --config Release \
              --update \
              --build \
              --build_wheel \
              --skip_tests \
              --enable_pybind \
              --parallel 2 \
              --cmake_extra_defines \
                  CMAKE_SYSTEM_PROCESSOR=armv7l \
                  onnxruntime_USE_FULL_PROTOBUF=OFF \
                  onnxruntime_BUILD_SHARED_LIB=OFF \
                  onnxruntime_USE_OPENBLAS=ON

          # 7. 输出
          WORKDIR /source/onnxruntime/build/Linux/Release/dist
          RUN ls -lh *.whl || (echo "Build failed, checking logs..." && exit 1)
          RUN mkdir -p /output && cp *.whl /output/
          EOF

          echo "--- Generated Dockerfile ---"
          cat Dockerfile.build
          echo "--------------------------"

          mkdir -p output

          # 构建
          docker buildx build \
            --platform linux/arm/v7 \
            --load \
            --progress=plain \
            --target builder \
            -t onnxruntime-armv7-builder \
            -f Dockerfile.build .

          # 提取
          CONTAINER_ID=$(docker create onnxruntime-armv7-builder)
          docker cp $CONTAINER_ID:/output/. ./output/
          docker rm $CONTAINER_ID

          echo "✅ Build Finished!"
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}
          path: output/*.whl
          retention-days: 14
