name: Build onnxruntime for ARMv7l (Final Syntax Fix)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (Host)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare Clean Apt Sources for ARMHF
        run: |
          echo "=== Nuking existing apt sources ==="
          sudo cp -r /etc/apt /etc/apt.bak
          sudo dpkg --add-architecture armhf
          
          echo "deb http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" | sudo tee /etc/apt/sources.list
          echo "deb http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb http://ports.ubuntu.com/ubuntu-ports noble-backports main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          
          sudo rm -rf /etc/apt/sources.list.d/*
          
          echo "=== Updating apt ==="
          sudo apt-get update
          echo "=== Apt update finished ==="

      - name: Install Cross Toolchain
        run: |
          echo "=== Installing Cross Toolchain ==="
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config \
            ccache \
            gfortran \
            zlib1g-dev:armhf \
            libbz2-dev:armhf \
            liblzma-dev:armhf \
            libncursesw5-dev:armhf \
            libreadline-dev:armhf \
            libsqlite3-dev:armhf \
            libgdbm-dev:armhf \
            libdb5.3-dev:armhf \
            libmpdec-dev:armhf \
            libexpat1-dev:armhf \
            uuid-dev:armhf \
            libxcrypt-dev:armhf || echo "Some optional packages skipped"

      - name: Manually Fetch ARM Python Headers
        run: |
          echo "=== Fetching ARM Python Headers ==="
          mkdir -p /home/runner/arm-sysroot/usr/include
          mkdir -p /home/runner/arm-sysroot/usr/lib
          
          cd /tmp
          if ! sudo apt-get download python3.11-dev:armhf python3.11-minimal:armhf 2>/dev/null; then
            echo "Trying generic python3-dev..."
            sudo apt-get download python3-dev:armhf python3-minimal:armhf 2>/dev/null || exit 1
          fi
          
          for deb in *.deb; do
            if [ -f "$deb" ]; then
              echo "Extracting $deb"
              dpkg -x "$deb" /home/runner/arm-sysroot
            fi
          done
          
          PYTHON_H_PATH=$(find /home/runner/arm-sysroot -name "Python.h" | head -n 1)
          if [ -z "$PYTHON_H_PATH" ]; then
            echo "Error: Python.h not found!"
            ls -R /home/runner/arm-sysroot/usr/include
            exit 1
          fi
          
          PYTHON_INC_DIR=$(dirname "$PYTHON_H_PATH")
          echo "Found Python.h in: $PYTHON_INC_DIR"
          
          TARGET_INC_DIR="/home/runner/arm-sysroot/usr/include/python3.11"
          if [ "$PYTHON_INC_DIR" != "$TARGET_INC_DIR" ]; then
            echo "Linking $PYTHON_INC_DIR to $TARGET_INC_DIR"
            mkdir -p "$(dirname "$TARGET_INC_DIR")"
            if [ -d "$TARGET_INC_DIR" ]; then rm -rf "$TARGET_INC_DIR"; fi
            ln -sf "$PYTHON_INC_DIR" "$TARGET_INC_DIR"
          fi
          
          # 写入 GITHUB_ENV
          echo "PYTHON_INCLUDE_DIR=$TARGET_INC_DIR" >> $GITHUB_ENV
          echo "Python headers ready."

      - name: Manually Fetch ARM NumPy Headers
        run: |
          echo "=== Fetching NumPy Headers ==="
          cd /tmp
          pip download numpy==${{ env.NUMPY_VERSION }} --no-binary=:all: -d /tmp/numpy_src
          
          cd /tmp/numpy_src
          TAR_FILE=$(ls *.tar.gz | head -n 1)
          tar xzf "$TAR_FILE"
          cd numpy-*
          
          SRC_NUMPY_INC="./numpy/core/include/numpy"
          DEST_NUMPY_INC="/home/runner/arm-sysroot/usr/include/numpy"
          
          mkdir -p "$DEST_NUMPY_INC"
          cp -r "$SRC_NUMPY_INC"/* "$DEST_NUMPY_INC/"
          
          # 写入 GITHUB_ENV
          echo "NUMPY_INCLUDE_DIR=$DEST_NUMPY_INC" >> $GITHUB_ENV
          echo "NumPy headers ready."

      - name: Install Host Build Tools
        run: |
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"

      - name: Download ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz -O onnxruntime-src.tar.gz
          rm -rf onnxruntime
          mkdir -p onnxruntime
          tar xzf onnxruntime-src.tar.gz -C onnxruntime --strip-components=1
          echo "Source ready."

      - name: Create Toolchain File
        run: |
          TOOLCHAIN_FILE="/home/runner/toolchain-armv7.cmake"
          echo "set(CMAKE_SYSTEM_NAME Linux)" > "$TOOLCHAIN_FILE"
          echo "set(CMAKE_SYSTEM_PROCESSOR armv7l)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)" >> "$TOOLCHAIN_FILE"
          echo "list(APPEND CMAKE_FIND_ROOT_PATH /home/runner/arm-sysroot)" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_C_FLAGS \"\${CMAKE_C_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-maybe-uninitialized -fPIC\")" >> "$TOOLCHAIN_FILE"
          echo "set(CMAKE_CXX_FLAGS \"\${CMAKE_CXX_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-maybe-uninitialized -Wno-class-memaccess -fPIC\")" >> "$TOOLCHAIN_FILE"
          echo "set(onnxruntime_BUILD_TESTS OFF)" >> "$TOOLCHAIN_FILE"
          echo "set(onnxruntime_BUILD_UNIT_TESTS OFF)" >> "$TOOLCHAIN_FILE"
          echo "Toolchain file created."

      - name: Build ONNX Runtime
        run: |
          cd onnxruntime
          rm -rf build/Linux
          
          # 【关键修复】直接使用 $VAR_NAME，不要使用 ${{ env.VAR_NAME }}
          # GitHub Actions 会自动将上一步写入 $GITHUB_ENV 的变量注入到当前 shell 环境
          export CFLAGS="-I$PYTHON_INCLUDE_DIR -I$NUMPY_INCLUDE_DIR"
          export CXXFLAGS="-I$PYTHON_INCLUDE_DIR -I$NUMPY_INCLUDE_DIR"
          
          echo "Building with Python Include: $PYTHON_INCLUDE_DIR"
          echo "Building with NumPy Include: $NUMPY_INCLUDE_DIR"
          echo "CFLAGS: $CFLAGS"
          
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 2 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_USE_OPENBLAS=OFF \
              onnxruntime_DISABLE_RTTI=ON \
              onnxruntime_BUILD_TESTS=OFF \
              "CMAKE_CXX_FLAGS=-Wno-error -Wno-all -Wno-extra" \
              "CMAKE_C_FLAGS=-Wno-error -Wno-all -Wno-extra"

      - name: Check and Upload
        run: |
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "BUILD SUCCESSFUL!"
            ls -lh *.whl
          else
            echo "Build failed."
            find . -name "*.whl"
            tail -n 50 build/Linux/Release/CMakeFiles/CMakeOutput.log 2>/dev/null || true
            exit 1
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-final-fixed
          path: "*.whl"
          retention-days: 14
