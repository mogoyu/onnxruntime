name: Build onnxruntime for ARMv7l (Final Fix - Multiarch Python)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  # 注意：这里不预先安装 numpy，让构建脚本处理，或者安装 armhf 版本

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (Host for running build.sh)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Enable ARMHF Architecture and Install Cross Dependencies
        run: |
          echo "=== Enabling multi-arch ==="
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          
          echo "=== Installing Cross Toolchain ==="
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config \
            ccache \
            gfortran
          
          echo "=== Installing ARMHF Python Dev Headers (Crucial Fix) ==="
          # 尝试安装 ARM 架构的 Python 开发包
          # 注意：Ubuntu 24.04/22.04 的 python3-dev:armhf 版本可能与宿主不一致，需小心
          # 如果找不到精确匹配的 3.11，可能需要找最近的或者手动处理
          sudo apt-get install -y \
            libpython3-dev:armhf \
            python3-numpy:armhf \
            zlib1g-dev:armhf \
            libbz2-dev:armhf \
            liblzma-dev:armhf \
            libncursesw5-dev:armhf \
            libreadline-dev:armhf \
            libsqlite3-dev:armhf \
            libgdbm-dev:armhf \
            libdb5.3-dev:armhf \
            libmpdec-dev:armhf || echo "Some armhf packages might not be available, proceeding..."
            
          # 验证安装
          ls /usr/include/arm-linux-gnueabihf/python* || echo "No armhf python headers found in standard path"

      - name: Install Host Python Build Tools (NOT numpy for cross-compile)
        run: |
          # 只安装构建脚本运行所需的工具，不安装 numpy (避免 CMake 混淆)
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"
          # 不安装 numpy! 让 build.sh 处理或者使用 armhf 的头文件

      - name: Download and Extract ONNX Runtime
        run: |
          echo "=== Downloading ONNX Runtime v${{ env.ONNXRUNTIME_VERSION }} ==="
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz -O onnxruntime-src.tar.gz
          
          rm -rf onnxruntime onnxruntime-src
          mkdir -p onnxruntime-src
          tar xzf onnxruntime-src.tar.gz -C onnxruntime-src --strip-components=1
          
          mv onnxruntime-src onnxruntime
          echo "✅ Source ready"

      - name: Create Toolchain File
        run: |
          cat <<EOF > /home/runner/toolchain-armv7.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          
          # 忽略警告
          set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-maybe-uninitialized -fPIC")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-error -Wno-array-bounds -Wno-stringop-overflow -Wno-maybe-uninitialized -Wno-class-memaccess -fPIC")
          
          set(onnxruntime_BUILD_TESTS OFF)
          set(onnxruntime_BUILD_UNIT_TESTS OFF)
          EOF
          echo "✅ Toolchain created"

      - name: Build ONNX Runtime
        run: |
          cd onnxruntime
          echo "=== Starting Build with ARMHF Python Headers ==="
          
          rm -rf build/Linux
          
          # 关键：设置 CMAKE_PREFIX_PATH 或 INCLUDE 路径以优先查找 armhf 头文件
          export CFLAGS="-I/usr/include/arm-linux-gnueabihf"
          export CXXFLAGS="-I/usr/include/arm-linux-gnueabihf"
          
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 2 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_USE_OPENBLAS=OFF \
              onnxruntime_DISABLE_RTTI=ON \
              onnxruntime_BUILD_TESTS=OFF \
              "CMAKE_CXX_FLAGS=-Wno-error -Wno-all -Wno-extra" \
              "CMAKE_C_FLAGS=-Wno-error -Wno-all -Wno-extra"

      - name: Check Build Output
        run: |
          echo "=== Checking Build Output ==="
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "✅ Build Successful!"
            ls -lh *.whl
          else
            echo "❌ Build failed."
            find . -name "*.whl"
            tail -n 100 build/Linux/Release/CMakeFiles/CMakeError.log 2>/dev/null || true
            exit 1
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}-multiarch
          path: "*.whl"
          retention-days: 14
