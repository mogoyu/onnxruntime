name: Build onnxruntime for ARMv7l (Cross-Compile Fixed v3)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-onnxruntime-armv7-cross.yml'

env:
  ONNXRUNTIME_VERSION: "1.15.0"
  PYTHON_VERSION: "3.11"
  NUMPY_VERSION: "1.23.5"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Cross-Compile Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            build-essential \
            cmake \
            git \
            wget \
            libssl-dev \
            libffi-dev \
            libeigen3-dev \
            pkg-config \
            ccache \
            gfortran

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel cython packaging sympy flatbuffers
          pip install "cmake>=3.26"
          pip install numpy==${{ env.NUMPY_VERSION }}
          cmake --version

      - name: Download and Extract ONNX Runtime
        run: |
          echo "=== Downloading ONNX Runtime v${{ env.ONNXRUNTIME_VERSION }} ==="
          wget https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz -O onnxruntime-src.tar.gz
          
          echo "=== Clean up any existing directories ==="
          rm -rf onnxruntime onnxruntime-src
          
          echo "=== Extracting with --strip-components=1 ==="
          mkdir -p onnxruntime-src
          tar xzf onnxruntime-src.tar.gz -C onnxruntime-src --strip-components=1
          echo "✅ Extract complete"
          
          echo "=== Verify build.sh exists in onnxruntime-src ==="
          if [ -f "onnxruntime-src/build.sh" ]; then
            echo "✅ build.sh found"
            ls -lh onnxruntime-src/build.sh
          else
            echo "❌ build.sh NOT found in onnxruntime-src"
            echo "=== Contents of onnxruntime-src ==="
            ls -la onnxruntime-src/
            exit 1
          fi
          
          echo "=== Rename onnxruntime-src to onnxruntime ==="
          mv onnxruntime-src onnxruntime
          if [ $? -ne 0 ]; then
            echo "❌ mv command failed!"
            exit 1
          fi
          echo "✅ mv complete"
          
          echo "=== Final verification ==="
          if [ -f "onnxruntime/build.sh" ]; then
            echo "✅ SUCCESS: onnxruntime/build.sh exists"
            ls -lh onnxruntime/build.sh
          else
            echo "❌ FAIL: onnxruntime/build.sh NOT found"
            echo "=== Current directory ==="
            pwd
            echo "=== Contents of current directory ==="
            ls -la
            echo "=== Contents of onnxruntime directory ==="
            ls -la onnxruntime/ 2>/dev/null || echo "onnxruntime directory does not exist"
            exit 1
          fi

      - name: Create Toolchain File
        run: |
          cat <<EOF > /home/runner/toolchain-armv7.cmake
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF
          echo "✅ Toolchain file created"

      - name: Build ONNX Runtime (Cross-Compile)
        run: |
          echo "=== Starting Build ==="
          cd onnxruntime
          echo "=== Current directory ==="
          pwd
          echo "=== Verify build.sh ==="
          ls -lh build.sh
          echo "=== Running build.sh ==="
          bash build.sh \
            --config Release \
            --update \
            --build \
            --build_wheel \
            --skip_tests \
            --enable_pybind \
            --parallel 2 \
            --allow_running_as_root \
            --skip_submodule_sync \
            --cmake_extra_defines \
              CMAKE_TOOLCHAIN_FILE=/home/runner/toolchain-armv7.cmake \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_SYSTEM_PROCESSOR=armv7l \
              onnxruntime_USE_FULL_PROTOBUF=OFF \
              onnxruntime_BUILD_SHARED_LIB=OFF \
              onnxruntime_USE_OPENBLAS=OFF

      - name: Check Build Output
        run: |
          echo "=== Checking Build Output ==="
          find . -name "*.whl" -type f
          if ls onnxruntime/build/Linux/Release/dist/*.whl 1>/dev/null 2>&1; then
            cp onnxruntime/build/Linux/Release/dist/*.whl ./
            echo "=== Wheel Files ==="
            ls -lh *.whl
          else
            echo "ERROR: No wheel file found!"
            find . -name "*.whl" -type f
            exit 1
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-armv7l-py${{ env.PYTHON_VERSION }}-cross
          path: "*.whl"
          retention-days: 14
