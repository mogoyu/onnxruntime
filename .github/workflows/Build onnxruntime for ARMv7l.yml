name: Cross-compile ONNX Runtime for armv7 (Python 3.11)

on:
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [ main ]

jobs:
  build-armv7-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull dockcross/armv7 image
        run: docker pull dockcross/armv7

      - name: Generate dockcross script
        run: |
          docker run --rm dockcross/armv7 > ./dockcross
          chmod +x ./dockcross

      - name: Install Python 3.11 and build tools inside container
        run: |
          ./dockcross bash -c "
            set -e
            apt-get update && apt-get install -y --no-install-recommends \
              software-properties-common wget cmake make \
              && add-apt-repository ppa:deadsnakes/ppa -y \
              && apt-get update \
              && apt-get install -y --no-install-recommends \
                python3.11 python3.11-dev python3.11-distutils python3-pip \
              && python3.11 -m pip install --upgrade pip setuptools wheel \
              && apt-get clean && rm -rf /var/lib/apt/lists/*
          "

      - name: Download ONNX Runtime source (v1.19.2)
      run: |
        ./dockcross bash -c "
          set -e
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v1.19.2.tar.gz
          tar xzf v1.19.2.tar.gz
        "

      - name: Cross-compile ONNX Runtime and build wheel
        id: build
        run: |
          ./dockcross bash -c "
            set -e
            cd onnxruntime-1.19.2

            # 设置交叉编译必需的环境变量
            export _PYTHON_HOST_PLATFORM=linux_armv7l
            export PYTHON_CROSSENV=1
            # 使用 dockcross 内置的工具链文件 (关键修正)
            TOOLCHAIN_FILE=/usr/share/cmake/toolchain.cmake

            echo 'Using toolchain: $TOOLCHAIN_FILE'
            cat $TOOLCHAIN_FILE

            python3.11 tools/ci_build/build.py \
              --build_dir build \
              --config Release \
              --arm \
              --cmake_extra_defines CMAKE_TOOLCHAIN_FILE=$TOOLCHAIN_FILE \
              --use_openmp \
              --build_wheel \
              --wheel_name_suffix=-armv7 \
              --skip_tests \
              --parallel
          "

      - name: Copy wheel to host
        run: |
          ./dockcross bash -c "cp onnxruntime-1.19.2/build/Release/dist/*.whl /work/ || true"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-armv7-python3.11-wheel
          path: ./*.whl
