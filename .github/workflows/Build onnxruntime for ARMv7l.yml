name: Cross-compile ONNX Runtime for armv7 (Python 3.11)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-armv7-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull dockcross/linux-armv7 image
        run: docker pull dockcross/linux-armv7

      - name: Generate dockcross script
        run: |
          docker run --rm dockcross/linux-armv7 > ./dockcross
          chmod +x ./dockcross

      - name: Install Python 3.11 and build tools inside container
        run: |
          ./dockcross bash -c "
            set -e
            # 安装编译 Python 和 ONNX Runtime 所需的依赖，包括 expat
            apt-get update && apt-get install -y --no-install-recommends \
              wget build-essential zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
              libssl-dev libreadline-dev libffi-dev libsqlite3-dev libbz2-dev \
              cmake make \
              libexpat1-dev

            # 下载 Python 源码
            PYTHON_VERSION=3.11.9
            wget -q https://www.python.org/ftp/python/\$PYTHON_VERSION/Python-\$PYTHON_VERSION.tar.xz
            tar -xf Python-\$PYTHON_VERSION.tar.xz

            # 1. 编译本机 Python（host版本，用于交叉编译过程）
            (
              cd Python-\$PYTHON_VERSION
              # 清除所有交叉编译环境变量，强制使用本机编译器
              unset CC CXX CPP CFLAGS CXXFLAGS LDFLAGS
              export CC=/usr/bin/gcc
              export CXX=/usr/bin/g++
              ./configure --prefix=/opt/host-python --build=x86_64-linux-gnu --with-system-expat
              make -j\$(nproc)
              make install
            )

            # 2. 交叉编译目标 Python（armv7版本）
            # 重新解压源码以确保干净
            rm -rf Python-\$PYTHON_VERSION
            tar -xf Python-\$PYTHON_VERSION.tar.xz
            cd Python-\$PYTHON_VERSION

            export CROSS_TRIPLE=armv7-unknown-linux-gnueabi
            export HOSTCC=gcc
            export HOSTCXX=g++
            # dockcross 已自动设置正确的交叉编译器环境变量（CC、CXX等），无需手动干预
            ./configure \
              --host=\$CROSS_TRIPLE \
              --build=x86_64-linux-gnu \
              --prefix=/usr/local \
              --with-build-python=/opt/host-python/bin/python3.11 \
              --enable-optimizations \
              --with-system-expat \
              --disable-ipv6 \
              --with-ensurepip=no \
              ac_cv_file__dev_ptmx=yes ac_cv_file__dev_ptc=yes

            make -j\$(nproc)

            # 安装前确保 PATH 优先使用本机 Python
            export PATH=/opt/host-python/bin:\$PATH
            make install
            cd ..

            # 手动安装 pip 和 setuptools 到目标 Python（使用本机 Python 运行 ensurepip）
            echo "Manually installing pip and setuptools for target Python..."
            export PATH=/opt/host-python/bin:\$PATH
            /opt/host-python/bin/python3.11 -m ensurepip --upgrade --root=/
            # 验证目标 Python 能否通过 QEMU 运行
            echo "Target Python version:"
            /usr/local/bin/python3.11 --version

            rm -rf Python-\$PYTHON_VERSION*

            # 清理 apt 缓存
            apt-get clean && rm -rf /var/lib/apt/lists/*
          "

      - name: Download ONNX Runtime source (v1.19.2)
        run: |
          ./dockcross bash -c "
            set -e
            wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v1.19.2.tar.gz
            tar xzf v1.19.2.tar.gz
          "

      - name: Cross-compile ONNX Runtime and build wheel
        id: build
        run: |
          ./dockcross bash -c "
            set -e
            cd onnxruntime-1.19.2

            # 确保本机 Python 在 PATH 中优先
            export PATH=/opt/host-python/bin:\$PATH
            export _PYTHON_HOST_PLATFORM=linux_armv7l
            export PYTHON_CROSSENV=1

            # 获取工具链文件路径，如果环境变量未设置，则使用默认路径
            TOOLCHAIN_FILE=\${DEFAULT_DOCKCROSS_CMAKE_TOOLCHAIN:-/usr/share/cmake/toolchain.cmake}
            echo 'Using toolchain: \$TOOLCHAIN_FILE'
            if [ -f \"\$TOOLCHAIN_FILE\" ]; then
              cat \$TOOLCHAIN_FILE
            else
              echo \"Error: Toolchain file not found at \$TOOLCHAIN_FILE\"
              exit 1
            fi

            python3.11 tools/ci_build/build.py \
              --build_dir build \
              --config Release \
              --arm \
              --cmake_extra_defines CMAKE_TOOLCHAIN_FILE=\$TOOLCHAIN_FILE onnxruntime_USE_OPENMP=ON \
              --build_wheel \
              --wheel_name_suffix=-armv7 \
              --skip_tests \
              --parallel
          "

      - name: Copy wheel to host
        run: |
          ./dockcross bash -c "cp onnxruntime-1.19.2/build/Release/dist/*.whl /work/ || true"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-armv7-python3.11-wheel
          path: ./*.whl
